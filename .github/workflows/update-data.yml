name: Update OpenPharmaDB

on:
  workflow_dispatch:

  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests fastjsonschema pytest

      - name: Fetch Health Canada
        run: python -m scripts.regulators.health_canada

      - name: Fetch FDA
        run: python -m scripts.regulators.fda

      - name: Merge datasets
        run: python -m scripts.core.merge

      - name: Validate dataset
        run: python -m scripts.core.validate

      - name: Run tests
        run: pytest

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/

          if git diff --cached --quiet; then
            echo "No dataset changes."
          else
            git commit -m "Update recall dataset"
            git push
          fi